// LadderManager — vanhemman näkymä pelkoportaikon hallintaan.
// Näyttää nykyisen tilan, ehdottaa tasonostoa, kertoo portaikon valmistumisesta.
function LadderManager({ player, onStartLadder, onAdvanceLadder, onStopLadder, onGoBackLadder, onResetStepReps, onRestartCompletedLadder }) {
  const [showStart, setShowStart] = useState(false);
  const [showCompleted, setShowCompleted] = useState(false);
  const [showResetMenu, setShowResetMenu] = useState(false);
  const ladder = player.ladder;
  const template = ladder ? LADDER_TEMPLATES.find(t => t.id === ladder.id) : null;

  // Tarkista onko nykyinen askelma saavuttanut siirtymäkynnyksen (5 toistoa)
  const stepIdx = ladder ? ladder.currentStep : 0;
  const currentReps = ladder ? (ladder.repsPerStep[stepIdx] || 0) : 0;
  const readyToAdvance = ladder && currentReps >= 5;
  const isLastStep = template && ladder && stepIdx >= template.steps.length - 1;
  const canGoBack = ladder && stepIdx > 0;
  // Lempeä muistutus kun toistoja on jo paljon (8+) eikä ole vielä siirrytty
  const manyReps = ladder && currentReps >= 8 && !isLastStep;

  // Suodatetaan saatavilla olevat pohjat — ei näytetä jo suoritettuja
  const completedIds = (player.completedLadders || []).map(c => c.id);
  const availableTemplates = LADDER_TEMPLATES.filter(t => !completedIds.includes(t.id));

  return (
    <div className="mt-6 rounded-2xl border-2 border-violet-300 bg-violet-50 p-4 shadow">
      <div className="flex items-center gap-2 mb-3">
        <span className="text-lg">🪜</span>
        <div className="flex-1">
          <div className="font-display text-base text-violet-900">Pelkoportaat</div>
          <div className="text-[11px] text-violet-800/70">Pitkän tähtäimen rohkeustavoite, askelma kerrallaan</div>
        </div>
      </div>

      {/* Ei aktiivista portaikkoa */}
      {!ladder && !showStart && (
        <div className="space-y-3">
          <p className="text-sm leading-snug text-violet-950">
            {(player.completedLadders || []).length > 0
              ? `${player.name} on suorittanut ${player.completedLadders.length} portaikon. Hieno saavutus.`
              : `${player.name} ei ole aloittanut portaikkoa. Voitte aloittaa yhdessä.`}
          </p>
          <button
            onClick={() => setShowStart(true)}
            className="w-full rounded-xl bg-violet-600 px-4 py-3 font-display text-sm text-white shadow active:translate-y-0.5"
          >
            ➕ Aloita uusi portaikko
          </button>
          {(player.completedLadders || []).length > 0 && (
            <button
              onClick={() => setShowCompleted(!showCompleted)}
              className="w-full text-xs text-violet-700 underline"
            >
              {showCompleted ? "Piilota" : "Näytä"} suoritetut portaikot ({player.completedLadders.length})
            </button>
          )}
          {showCompleted && (
            <div className="space-y-2 mt-2">
              {(player.completedLadders || []).map((c, i) => {
                const t = LADDER_TEMPLATES.find(tt => tt.id === c.id);
                if (!t) return null;
                return (
                  <div key={i} className="rounded-xl bg-white p-3 border border-violet-200">
                    <div className="flex items-center gap-2 mb-2">
                      <span>{t.emoji}</span>
                      <span className="font-display text-sm text-violet-900">{t.title}</span>
                      <span className="ml-auto text-[10px] text-violet-700/60">✓ valmis</span>
                    </div>
                    <button
                      onClick={() => {
                        if (confirm(`Aloitetaanko portaikko «${t.title}» uudelleen? Voi olla hyödyllistä kertauksena tai uudessa tilanteessa (esim. uusi joukkue, kausi).`)) {
                          onRestartCompletedLadder(t.id);
                        }
                      }}
                      className="w-full text-[11px] text-violet-700 underline"
                    >
                      🔁 Aloita uudelleen
                    </button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Pohjavalikoima portaikon aloittamiseen */}
      {!ladder && showStart && (
        <div className="space-y-2">
          <p className="text-xs italic text-violet-800 leading-relaxed mb-2">
            Valitse pohja, joka sopii {player.name}n nykyiseen rohkeustarpeeseen. Voitte vaihtaa myöhemmin.
          </p>
          {availableTemplates.map(t => (
            <button
              key={t.id}
              onClick={() => {
                if (confirm(`Aloita portaikko «${t.title}»? ${player.name} näkee sen heti etusivulla.`)) {
                  onStartLadder(t.id);
                  setShowStart(false);
                }
              }}
              className="w-full rounded-xl bg-white border border-violet-200 p-3 text-left active:bg-violet-100 transition"
            >
              <div className="flex items-center gap-2 mb-1">
                <span className="text-base">{t.emoji}</span>
                <span className="font-display text-sm text-violet-900">{t.title}</span>
              </div>
              <p className="text-[11px] text-violet-800/70 leading-snug">Tavoite: {t.goal}</p>
              <p className="text-[10px] text-violet-700/60 mt-1">{t.steps.length} askelmaa</p>
            </button>
          ))}
          <button
            onClick={() => setShowStart(false)}
            className="w-full text-xs text-violet-700 underline mt-2"
          >
            Peruuta
          </button>
        </div>
      )}

      {/* Aktiivinen portaikko */}
      {ladder && template && (
        <div className="space-y-3">
          <div className="rounded-xl bg-white p-3 border border-violet-200">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-base">{template.emoji}</span>
              <span className="font-display text-sm text-violet-900">{template.title}</span>
            </div>
            <p className="text-[11px] text-violet-800/70 leading-snug mb-3">Tavoite: {template.goal}</p>
            <div className="space-y-1.5">
              {template.steps.map((step, i) => {
                const reps = ladder.repsPerStep[i] || 0;
                const isPast = i < stepIdx;
                const isCurrent = i === stepIdx;
                return (
                  <div key={i} className={`flex items-center gap-2 text-xs ${isPast ? "opacity-50" : ""} ${isCurrent ? "font-bold" : ""}`}>
                    <span className={`flex-shrink-0 w-5 h-5 rounded-full flex items-center justify-center text-[10px] ${isPast ? "bg-violet-200 text-violet-700" : isCurrent ? "bg-violet-600 text-white" : "bg-amber-100 text-amber-700"}`}>
                      {isPast ? "✓" : i + 1}
                    </span>
                    <span className={`flex-1 leading-snug ${isPast ? "line-through text-violet-700" : isCurrent ? "text-violet-950" : "text-amber-900"}`}>{step}</span>
                    {isCurrent && (
                      <span className="text-[10px] text-violet-700">{Array.from({length: 5}).map((_, j) => j < reps ? "🦁" : "·").join("")}</span>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Tasonosto-ehdotus */}
          {readyToAdvance && !isLastStep && (
            <div className="rounded-xl bg-emerald-50 border-2 border-emerald-300 p-3">
              <div className="font-display text-sm text-emerald-900 mb-1">🎉 Valmis seuraavaan?</div>
              <p className="text-xs leading-snug text-emerald-950 mb-2">
                {player.name} on yrittänyt askelmaa {stepIdx + 1} viidesti. Tuntuuko hän valmiilta askelmaan {stepIdx + 2}?
              </p>
              <p className="text-[11px] italic text-emerald-800/70 mb-3">
                Ei pakkoa siirtyä — voitte jatkaa samalla askelmalla niin kauan kuin tuntuu hyvältä. Lisätoistot kasvattavat varmuutta.
              </p>
              <div className="flex gap-2">
                <button
                  onClick={() => {
                    if (confirm(`Siirrytäänkö askelmaan ${stepIdx + 2}?`)) onAdvanceLadder();
                  }}
                  className="flex-1 rounded-lg bg-emerald-600 px-3 py-2 text-sm font-bold text-white"
                >
                  Kyllä, siirry
                </button>
                <button
                  onClick={() => {/* Ei tee mitään, pysytään samalla askelmalla */}}
                  className="flex-1 rounded-lg bg-white border border-emerald-300 px-3 py-2 text-sm text-emerald-800"
                >
                  Ei vielä
                </button>
              </div>
            </div>
          )}

          {/* Viimeinen askelma suoritettu */}
          {readyToAdvance && isLastStep && (
            <div className="rounded-xl bg-amber-50 border-2 border-amber-400 p-3">
              <div className="font-display text-sm text-amber-900 mb-1">🏆 Portaikko valmis!</div>
              <p className="text-xs leading-snug text-amber-950 mb-2">
                {player.name} on käynyt läpi koko «{template.title}» -portaikon. Tämä on iso saavutus — viikkoja sinnikkyyttä ja rohkeutta.
              </p>
              <p className="text-xs leading-snug text-amber-950 mb-3">
                Voit halutessasi juhlia tätä konkreettisesti. Sopikaa hänen kanssaan sopiva palkkio — esim. padiaikaa, yhteinen retki tai lapsen valitsema ohjelma.
              </p>
              <button
                onClick={() => {
                  if (confirm(`Päättääkö portaikko «${template.title}»? Voitte aloittaa myöhemmin uuden.`)) onAdvanceLadder();
                }}
                className="w-full rounded-lg bg-amber-600 px-3 py-2 text-sm font-bold text-white"
              >
                Olen juhlinut tätä — päätä portaikko
              </button>
            </div>
          )}

          {/* Lempeä muistutus kun toistoja on paljon eikä ole siirrytty */}
          {manyReps && !readyToAdvance && (
            <div className="rounded-xl bg-amber-100 border border-amber-300 p-3">
              <p className="text-xs leading-snug text-amber-900">
                💡 {player.name} on harjoitellut tätä askelmaa jo {currentReps} kertaa. Voitte halutessanne siirtyä seuraavaan askelmaan, mutta ei ole pakko — lisätoistot kasvattavat varmuutta.
              </p>
            </div>
          )}
          {manyReps && readyToAdvance && (
            <div className="rounded-xl bg-amber-100 border border-amber-300 p-3 -mt-2">
              <p className="text-[11px] italic leading-snug text-amber-800">
                Toistoja on jo {currentReps}. Jos askelma alkaa tuntua tylsältä, on hyvä hetki siirtyä eteenpäin.
              </p>
            </div>
          )}

          {/* Vinkki kun portaikko aloitetaan */}
          {currentReps === 0 && stepIdx === 0 && (
            <div className="rounded-xl bg-amber-100/60 p-3 text-xs leading-relaxed text-amber-900">
              <strong className="font-display">💡 Vinkki:</strong> Sopikaa {player.name}n kanssa <strong>etukäteen</strong> palkkio koko portaikon suorittamisesta. Materiaalin mukaan palkkio annetaan yrittämisestä, vaikka kaikki askelmat eivät menisi täydellisesti.
            </div>
          )}

          {/* Säädä portaikkoa -valikko */}
          <button
            onClick={() => setShowResetMenu(!showResetMenu)}
            className="w-full text-xs text-violet-700 underline mt-2"
          >
            {showResetMenu ? "Sulje" : "Säädä portaikkoa"} ⚙️
          </button>

          {showResetMenu && (
            <div className="rounded-xl bg-white border border-violet-200 p-3 space-y-2 animate-pop">
              <p className="text-[11px] italic text-violet-800/70 leading-snug mb-2">
                Materiaalin mukaan takapakeista ei lannistuta. Voit tehdä portaikkoon säätöjä, jos lapsen tilanne sitä vaatii.
              </p>

              {/* Taaksepäin */}
              {canGoBack && (
                <button
                  onClick={() => {
                    if (confirm(`Siirrytäänkö takaisin askelmaan ${stepIdx}? Toistot säilyvät. Kerro tämä lapselle ystävällisesti — ei rangaistuksena vaan rauhallisena valintana.`)) {
                      onGoBackLadder();
                      setShowResetMenu(false);
                    }
                  }}
                  className="w-full rounded-lg bg-white border border-violet-300 p-3 text-left active:bg-violet-50"
                >
                  <div className="font-display text-sm text-violet-900">← Takaisin askelmaan {stepIdx}</div>
                  <div className="text-[11px] text-violet-800/70 leading-snug mt-0.5">Jos nykyinen askelma tuntuu liian vaikealta. Toistot säilyvät, ei aloiteta alusta.</div>
                </button>
              )}

              {/* Nollaa nykyisen askelman toistot */}
              {currentReps > 0 && (
                <button
                  onClick={() => {
                    if (confirm(`Nollataanko askelman ${stepIdx + 1} toistot? Toistolaskuri menee nollaan, mutta askelma pysyy samana.`)) {
                      onResetStepReps();
                      setShowResetMenu(false);
                    }
                  }}
                  className="w-full rounded-lg bg-white border border-violet-300 p-3 text-left active:bg-violet-50"
                >
                  <div className="font-display text-sm text-violet-900">🔄 Nollaa nykyisen askelman toistot</div>
                  <div className="text-[11px] text-violet-800/70 leading-snug mt-0.5">Aloita nykyinen askelma puhtaalta pöydältä. Esim. pidemmän tauon jälkeen.</div>
                </button>
              )}

              {/* Lopeta portaikko */}
              <button
                onClick={() => {
                  if (confirm("Lopetetaanko koko portaikko? Edistyminen tallentuu mutta portaikko poistuu etusivulta. Voitte aloittaa uuden milloin haluatte.")) {
                    onStopLadder();
                    setShowResetMenu(false);
                  }
                }}
                className="w-full rounded-lg bg-white border border-violet-300 p-3 text-left active:bg-violet-50"
              >
                <div className="font-display text-sm text-violet-900">🚪 Lopeta koko portaikko</div>
                <div className="text-[11px] text-violet-800/70 leading-snug mt-0.5">Jos haluatte vaihtaa toiseen tai pitää tauon.</div>
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Toggle({ label, desc, checked, onChange }) {
  return (
    <div className="flex items-center justify-between rounded-2xl border-2 border-amber-200 bg-white p-4 shadow">
      <div className="pr-3"><div className="font-display text-base text-amber-900">{label}</div>{desc && <div className="text-xs text-amber-800/70">{desc}</div>}</div>
      <button onClick={() => onChange(!checked)} className={`relative h-7 w-12 rounded-full transition ${checked ? "bg-orange-500" : "bg-amber-200"}`}>
        <span className={`absolute top-1 h-5 w-5 rounded-full bg-white shadow transition-all ${checked ? "left-6" : "left-1"}`} />
      </button>
    </div>
  );
}

function NumberRow({ label, value, onChange, step = 1 }) {
  return (
    <div className="flex items-center justify-between rounded-2xl border-2 border-amber-200 bg-white p-4 shadow">
      <div className="font-display text-sm text-amber-900">{label}</div>
      <div className="flex items-center gap-2">
        <button onClick={() => onChange(Math.max(0, value - step))} className="flex h-9 w-9 items-center justify-center rounded-full bg-amber-100 text-amber-800 text-xl font-bold">−</button>
        <span className="font-display w-10 text-center text-xl text-amber-900">{value}</span>
        <button onClick={() => onChange(value + step)} className="flex h-9 w-9 items-center justify-center rounded-full bg-orange-500 text-white text-xl font-bold">+</button>
      </div>
    </div>
  );
}

// PadiBank — padiaikasaldon laskuri ja vähennys. Vain vanhemman näkymässä.
function PadiBank({ balance, playerName, onUse }) {
  const [custom, setCustom] = useState(15);
  const quickAmounts = [15, 30, 60];
  return (
    <div className="rounded-2xl border-2 border-emerald-300 bg-emerald-50 p-4 shadow">
      <div className="flex items-center gap-2 mb-1">
        <span className="text-lg">🏦</span>
        <div className="font-display text-base text-emerald-900">Padiaikapankki</div>
      </div>
      <p className="text-[11px] text-emerald-800/70 mb-3">Kertynyt padiaika. Vähennä saldoa kun {playerName} on käyttänyt sitä.</p>

      <div className="rounded-xl bg-white border border-emerald-200 p-4 text-center mb-3">
        <div className="text-[10px] uppercase tracking-wider text-emerald-700/70 font-bold">Saldo nyt</div>
        <div className="flex items-baseline justify-center gap-1">
          <span className="font-display text-4xl text-emerald-700">{balance}</span>
          <span className="font-display text-base text-emerald-900">min</span>
        </div>
      </div>

      {balance > 0 ? (
        <>
          <div className="text-xs font-bold text-emerald-800/80 mb-2">Vähennä käytetty aika:</div>
          <div className="grid grid-cols-3 gap-2 mb-2">
            {quickAmounts.map(a => (
              <button
                key={a}
                onClick={() => onUse(Math.min(a, balance))}
                className="rounded-lg bg-white border border-emerald-300 px-2 py-2 text-sm font-bold text-emerald-800 active:bg-emerald-100"
              >
                −{a} min
              </button>
            ))}
          </div>
          <div className="flex items-center gap-2">
            <div className="flex items-center gap-1 flex-1">
              <button onClick={() => setCustom(Math.max(5, custom - 5))} className="flex h-8 w-8 items-center justify-center rounded-full bg-emerald-100 text-emerald-800 font-bold">−</button>
              <span className="font-display w-12 text-center text-emerald-900">{custom}</span>
              <button onClick={() => setCustom(custom + 5)} className="flex h-8 w-8 items-center justify-center rounded-full bg-emerald-200 text-emerald-800 font-bold">+</button>
            </div>
            <button
              onClick={() => onUse(Math.min(custom, balance))}
              className="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-bold text-white"
            >
              Vähennä
            </button>
          </div>
          <button
            onClick={() => { if (confirm("Nollataanko koko padiaikasaldo?")) onUse(balance); }}
            className="w-full mt-2 text-[11px] text-emerald-700/70 underline"
          >
            Nollaa koko saldo
          </button>
        </>
      ) : (
        <p className="text-xs italic text-emerald-800/70 text-center">Ei käyttämätöntä padiaikaa juuri nyt.</p>
      )}
    </div>
  );
}

      <button onClick={onBack} className="mb-4 flex items-center gap-1 text-sm font-bold text-amber-800">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Takaisin
      </button>
      <h2 className="font-display mb-1 text-3xl text-amber-900">Saavutukset</h2>
      <p className="mb-5 text-sm text-amber-800/70">Olet avannut {unlocked.length} / {ACHIEVEMENTS.length}.</p>
      <div className="space-y-3">
        {ACHIEVEMENTS.map(a => {
          const isUnlocked = unlockedIds.has(a.id);
          return (
            <div key={a.id} className={`flex items-start gap-3 rounded-2xl border-2 p-4 shadow ${isUnlocked ? "border-violet-300 bg-violet-50" : "border-amber-100 bg-white/40 opacity-50"}`}>
              <div className="text-3xl">{isUnlocked ? a.emoji : "🔒"}</div>
              <div className="flex-1">
                <div className={`font-display text-base ${isUnlocked ? "text-violet-950" : "text-amber-900/60"}`}>
                  {isUnlocked ? a.title : "Avautuu kun aika on oikea"}
                </div>
                {isUnlocked && <div className="text-sm text-violet-900/80 mt-0.5">{a.sub}</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function WeekView({ player, theme, onBack }) {
  const history = player.history || [];
  const last7 = history.filter((h) => Date.now() - new Date(h.date).getTime() < 7 * 24 * 60 * 60 * 1000);
  const last14 = history.filter((h) => Date.now() - new Date(h.date).getTime() < 14 * 24 * 60 * 60 * 1000);
  const continuedCount = last7.filter((h) => h.continuedAfterMistake === "yes").length;
  const kinds = last7.reduce((acc, h) => { if (h.bravestKind) acc[h.bravestKind] = (acc[h.bravestKind] || 0) + 1; return acc; }, {});
  const topKind = Object.entries(kinds).sort((a, b) => b[1] - a[1])[0]?.[0];
  const kindNames = {
    steal: { name: "pallonriistoissa", emoji: "🛡️" }, trick: { name: "harhautuksissa", emoji: "🌀" },
    run: { name: "kuljetuksissa", emoji: "⚡" }, scared: { name: "tilanteisiin menemisessä", emoji: "🦁" },
    again: { name: "virheen jälkeen jatkamisessa", emoji: "🔁" }, fail: { name: "mokien sietämisessä", emoji: "😅" },
    newthing: { name: "uuden kokeilemisessa", emoji: "🌱" },
  };
  const topInfo = topKind ? kindNames[topKind] : null;

  // Ahdistusmittarin tilastot — viimeisen 14 päivän keskiarvot ja muutos
  const last14WithAnxiety = last14.filter(h => h.prePracticeAnxiety !== null && h.prePracticeAnxiety !== undefined && h.postPracticeAnxiety !== null && h.postPracticeAnxiety !== undefined);
  let anxietyStats = null;
  if (last14WithAnxiety.length >= 3) {
    const avgBefore = last14WithAnxiety.reduce((s,h) => s + h.prePracticeAnxiety, 0) / last14WithAnxiety.length;
    const avgAfter = last14WithAnxiety.reduce((s,h) => s + h.postPracticeAnxiety, 0) / last14WithAnxiety.length;
    const declines = last14WithAnxiety.filter(h => h.postPracticeAnxiety < h.prePracticeAnxiety).length;
    anxietyStats = {
      count: last14WithAnxiety.length,
      avgBefore: avgBefore.toFixed(1),
      avgAfter: avgAfter.toFixed(1),
      decline: (avgBefore - avgAfter).toFixed(1),
      declinesCount: declines,
    };
  }

  // 14 päivän koonti — näkyy vain vanhemmalle, vain jos riittävästi kirjauksia
  const last14Brave = last14.filter(h => h.bravestMoment).length;
  const last14Continued = last14.filter(h => h.continuedAfterMistake === "yes").length;
  let twoWeekSummary = null;
  if (last14Brave >= 6) {
    // Valitse 2 ehdotusta vaihteleen päivän perusteella, etteivät aina samat
    const ideas = [
      "Tehkää yhdessä lemppariruoka",
      "Lähtekää yhdessä uimaan tai puistoon",
      "Katsokaa yhdessä elokuva, jonka lapsi valitsee",
      "Antakaa lapsen päättää illan ohjelma",
      "Kutsukaa kaveri kylään tai mennään hänen luokseen",
      "Tehkää retki paikkaan jossa ette ole käyneet",
      "Pelatkaa yhdessä lautapeliä tai pihapeliä",
      "Antakaa lapsen valita aamupala ja tehkää se yhdessä",
    ];
    const seed = Math.floor(Date.now() / (1000 * 60 * 60 * 24 * 14));
    const idea1 = ideas[seed % ideas.length];
    const idea2 = ideas[(seed + 3) % ideas.length];
    twoWeekSummary = {
      brave: last14Brave,
      continued: last14Continued,
      ideas: [idea1, idea2],
    };
  }

  let summary = null;
  if (last7.length > 0) {
    const moods = last7.map((h) => h.mood).filter(Boolean);
    const nervousCount = moods.filter((m) => m === "😬" || m === "😤").length;
    const positiveCount = moods.filter((m) => m === "😄" || m === "🦁").length;
    let observation, suggestion;
    if (continuedCount >= 3) observation = `${player.name} kertoi jatkaneensa virheen jälkeen ${continuedCount} kertaa. Tämä on viikon tärkein havainto.`;
    else if (nervousCount >= 3 && positiveCount === 0) observation = "Viikko on ollut jännittävä. Pelaaja silti kirjasi rohkeita hetkiä — se itsessään on rohkeutta.";
    else if (positiveCount >= 3) observation = "Viikko on tuntunut hyvältä. Hyvä hetki vahvistaa onnistumisten muistelua.";
    else if (topInfo) observation = `Viikon aikana toistui erityisesti rohkeus ${topInfo.name}. Kannattaa huomata tämä.`;
    else observation = "Viikolla on kirjautunut hetkiä. Jokainen kirjaus on jo askel.";
    if (continuedCount >= 2) suggestion = `Sano ${player.name}lle viikon päätteeksi: «Huomasin että jatkoit useamman virheen jälkeen tällä viikolla. Se on rohkeuden ydin.»`;
    else if (topInfo) suggestion = `Sano ${player.name}lle viikon päätteeksi: «Huomasin että ${topInfo.name} oli usein viikon rohkein hetki. Hieno juttu.»`;
    else suggestion = `Sano ${player.name}lle viikon päätteeksi: «Hyvä että muistit kirjata. Se itsessään on jo iso juttu.»`;
    summary = { observation, suggestion };
  }

  return (
    <div className="animate-pop">
      <button onClick={onBack} className="mb-4 flex items-center gap-1 text-sm font-bold text-amber-800">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Takaisin
      </button>
      <h2 className="font-display mb-1 text-3xl text-amber-900">{player.name} — Viikon rohkeus</h2>
      <p className="mb-5 text-sm text-amber-800/70">Vain havainnot — ei vertailua, ei tavoitteita.</p>
      {summary && (
        <div className="mb-5 rounded-2xl border-2 border-amber-200 bg-white p-5 shadow-xl">
          <div className="mb-2 flex items-center gap-2 text-xs font-extrabold uppercase tracking-wider text-amber-800">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            Vanhemmalle — viikon koonti
          </div>
          <p className="font-display text-base leading-snug text-amber-950">{summary.observation}</p>
          <div className="mt-3 rounded-xl bg-amber-50 p-3">
            <p className="font-display text-sm leading-snug text-amber-950">💡 <strong>{summary.suggestion}</strong></p>
          </div>
        </div>
      )}

      {/* 14 päivän koonti — näkyy vain vanhemmalle, ehdottaa yhteistä aikaa */}
      {twoWeekSummary && (
        <div className="mb-5 rounded-2xl border-[3px] border-violet-400 bg-gradient-to-br from-violet-50 to-pink-50 p-5 shadow-xl">
          <div className="mb-2 flex items-center gap-2 text-xs font-extrabold uppercase tracking-wider text-violet-800">
            <span className="text-base">🧡</span>
            <span>Vanhemmalle — kahden viikon havainto</span>
          </div>
          <p className="font-display text-base leading-snug text-violet-950">
            {player.name} on kirjannut <strong>{twoWeekSummary.brave} rohkeaa hetkeä</strong> viimeisten 14 päivän aikana.
            {twoWeekSummary.continued >= 2 && <> Hän on jatkanut virheen jälkeen <strong>{twoWeekSummary.continued} kertaa</strong>.</>}
          </p>
          <p className="font-display text-sm leading-snug text-violet-900 mt-2">
            Tämä on iso asia. Olisi hyvä juhlistaa yhdessä — ei palkintona vaan yhteisenä hetkenä:
          </p>
          <ul className="mt-3 space-y-1.5">
            {twoWeekSummary.ideas.map((idea, i) => (
              <li key={i} className="font-display text-sm leading-snug text-violet-950 flex items-start gap-2">
                <span className="text-violet-500 mt-0.5">•</span>
                <span>{idea}</span>
              </li>
            ))}
          </ul>
          <div className="mt-4 rounded-xl bg-white/70 p-3">
            <p className="font-display text-sm leading-snug text-violet-950">
              💡 <strong>Sano sitä tehdessä:</strong> «Huomasin että olet uskaltanut paljon viime aikoina. Halusin että vietämme aikaa yhdessä siksi.»
            </p>
          </div>
        </div>
      )}
      {/* Ahdistusmittarin koonti — vanhemmalle, jos riittävästi kirjauksia */}
      {anxietyStats && (
        <div className="mb-5 rounded-2xl border-2 border-sky-300 bg-sky-50 p-5 shadow">
          <div className="mb-2 flex items-center gap-2 text-xs font-extrabold uppercase tracking-wider text-sky-800">
            <span>📊</span>
            <span>Vanhemmalle — jännityksen kehitys</span>
          </div>
          <p className="font-display text-sm leading-snug text-sky-950 mb-3">
            {player.name} on käyttänyt rohkeusmittaria <strong>{anxietyStats.count} kertaa</strong> viimeisen 14 päivän aikana.
          </p>
          <div className="grid grid-cols-2 gap-3 mb-3">
            <div className="rounded-xl bg-white p-3 text-center border border-sky-200">
              <div className="text-[10px] uppercase tracking-wider text-sky-700/70 font-bold">Ennen, keskim.</div>
              <div className="font-display text-2xl text-sky-900">{anxietyStats.avgBefore}</div>
            </div>
            <div className="rounded-xl bg-white p-3 text-center border border-sky-200">
              <div className="text-[10px] uppercase tracking-wider text-sky-700/70 font-bold">Jälkeen, keskim.</div>
              <div className="font-display text-2xl text-sky-900">{anxietyStats.avgAfter}</div>
            </div>
          </div>
          <p className="text-sm text-sky-950 leading-snug">
            {anxietyStats.decline > 0.5 ? (
              <>Jännitys on laskenut keskimäärin <strong>{anxietyStats.decline} pykälää</strong> tilanteen aikana. {anxietyStats.declinesCount} kertaa {anxietyStats.count}:stä tunne laski. Tämä on tärkeä oivallus lapselle: jännitys laskee aina ennen pitkää.</>
            ) : (
              <>Tilanteet ovat tuntuneet melko samalta ennen ja jälkeen. Tämä on ihan ok — joskus mittari paljastaa että jännitys ei laskenutkaan, ja sekin tieto on arvokas. Voi olla hyvä keskustella mistä se johtuu.</>
            )}
          </p>
        </div>
      )}

      <div className="mb-4 grid grid-cols-2 gap-3">
        <Stat label="Treeniä kirjattu" value={last7.length} />
        <Stat label="Jatkoi virheen jälkeen" value={continuedCount} />
      </div>
      {topInfo && (
        <div className={`mb-4 rounded-2xl bg-gradient-to-br ${theme.gradient} p-5 text-white shadow-xl`}>
          <div className="text-xs font-bold uppercase tracking-wider opacity-90">Tällä viikolla</div>
          <p className="font-display mt-1 text-xl leading-snug">Rohkeus kasvoi erityisesti {topInfo.name} {topInfo.emoji}</p>
        </div>
      )}
      {last7.length > 0 && (
        <div className="rounded-2xl border-2 border-amber-200 bg-white p-4 shadow">
          <div className="mb-3 text-xs font-bold uppercase tracking-wider text-amber-700">Viikon hetket</div>
          <div className="space-y-2">
            {last7.slice(-7).reverse().map((h, i) => (
              <div key={i} className="flex items-start gap-3 border-t border-amber-100 pt-2 first:border-0 first:pt-0">
                <div className="text-2xl">{h.title.split(" ")[0]}</div>
                <div className="flex-1">
                  <div className="font-display text-sm text-amber-900">{h.bravestMoment || "—"}</div>
                  <div className="text-xs text-amber-700/70">{new Date(h.date).toLocaleDateString("fi-FI", { weekday: "long" })}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
      {last7.length === 0 && (
        <div className="rounded-2xl border-2 border-dashed border-amber-300 bg-white/60 p-6 text-center text-amber-800">
          <div className="mb-2 text-4xl">🦁</div>
          Ei kirjauksia vielä. Ei kiirettä — täytä, kun siltä tuntuu.
        </div>
      )}
    </div>
  );
}

function Stat({ label, value }) {
  return (
    <div className="rounded-2xl border-2 border-amber-200 bg-white p-4 text-center shadow">
      <div className="font-display text-4xl text-amber-900">{value}</div>
      <div className="text-xs font-bold uppercase tracking-wider text-amber-700">{label}</div>
    </div>
  );
}

function OptionButton({ selected, anySelected, onClick, children, theme }) {
  const selectedBorder = (theme && theme.selectedBorder) || "border-orange-500";
  const selectedBg = (theme && theme.selectedBg) || "bg-orange-50";
  const selectedRing = (theme && theme.selectedRing) || "ring-orange-200";

  let cls = "flex w-full items-center gap-3 rounded-2xl border-2 p-4 text-left transition-all duration-300 ";
  if (selected) cls += `${selectedBorder} ${selectedBg} shadow-xl ring-4 ${selectedRing}`;
  else if (anySelected) cls += "border-amber-100 bg-white/40 opacity-40";
  else cls += "border-amber-200 bg-white shadow";
  return <button onClick={onClick} className={cls}>{children}</button>;
}

function StepNav({ onBack, onSkip, step, total }) {
  return (
    <div className="mb-4 flex items-center justify-between">
      <button onClick={onBack} className="flex items-center gap-1 rounded-full bg-white/70 px-3 py-1.5 text-sm font-bold text-amber-800 shadow" aria-label="Edellinen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Edellinen
      </button>
      {step && total && <div className="text-xs font-bold uppercase tracking-wider text-amber-700/70">{step} / {total}</div>}
      {onSkip && <button onClick={onSkip} className="rounded-full bg-white/70 px-3 py-1.5 text-sm font-bold text-amber-800 shadow">Ohita →</button>}
    </div>
  );
}

function EncourageBox({ reply }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) {
      const t = setTimeout(() => { ref.current?.scrollIntoView({ behavior: "smooth", block: "nearest" }); }, 200);
      return () => clearTimeout(t);
    }
  }, [reply?.text]);
  if (!reply) return null;
  const style = TONE_STYLES[reply.tone] || TONE_STYLES.amber;
  const parts = reply.text.split(reply.highlight);
  return (
    <div ref={ref} className="animate-pop-big mt-6 relative">
      <div className="absolute -left-2 -top-3 z-10 flex h-12 w-12 items-center justify-center rounded-full border-[3px] border-white bg-white text-3xl shadow-xl animate-wiggle">{reply.icon}</div>
      <div className={`rounded-2xl border-[3px] p-5 pl-12 shadow-xl ${style.box}`}>
        <p className="font-display text-lg leading-snug">
          {parts[0]}
          <strong className={`rounded-md px-1.5 py-0.5 ${style.hl}`}>{reply.highlight}</strong>
          {parts[1]}
        </p>
      </div>
    </div>
  );
}

function BigButton({ children, onClick, disabled, theme }) {
  const buttonGradient = (theme && theme.button) || "from-orange-500 to-rose-500";
  return (
    <button onClick={onClick} disabled={disabled}
      className={`w-full rounded-2xl px-6 py-5 font-display text-xl text-white shadow-xl transition ${disabled ? "cursor-not-allowed bg-amber-200 text-amber-500" : `bg-gradient-to-br ${buttonGradient}`}`}>
      {children}
    </button>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Rohkeusliiga />);
</script>
</body>
</html>
